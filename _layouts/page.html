---
layout: default
---

<section class="page-intro">
  <div class="container">
    {% if page.eyebrow %}
      <p class="eyebrow">{{ page.eyebrow }}</p>
    {% endif %}
    <h1>{{ page.title }}</h1>
    {% if page.description %}
      <p>{{ page.description }}</p>
    {% endif %}
  </div>
</section>

<section class="section">
  <div class="container">
    {{ content }}
  </div>
</section>
